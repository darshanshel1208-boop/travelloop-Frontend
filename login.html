<!DOCTYPE html>
<html lang="en-US" dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | Travelloop</title>
    <link href="assets/css/theme.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&amp;family=Volkhov:wght@700&amp;display=swap" rel="stylesheet">
  </head>
  <body>
    <main class="main" id="top">
      <nav class="navbar navbar-expand-lg navbar-light fixed-top py-5 d-block" data-navbar-on-scroll="data-navbar-on-scroll">
        <div class="container"><a class="navbar-brand fw-bold fs-3 text-primary" style="font-family: 'Volkhov', serif;" href="index.html">Travelloop</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"> </span></button>
          <div class="collapse navbar-collapse border-top border-lg-0 mt-4 mt-lg-0" id="navbarSupportedContent">
            <ul class="navbar-nav ms-auto pt-2 pt-lg-0 font-base align-items-lg-center align-items-start">
              <li class="nav-item px-3 px-xl-4"><a class="nav-link fw-medium" aria-current="page" href="index.html#destination">Destinations</a></li>
              <li class="nav-item px-3 px-xl-4"><a class="nav-link fw-medium" aria-current="page" href="dashboard.html">Dashboard</a></li>
              <li class="nav-item px-3 px-xl-4"><a class="nav-link fw-medium" aria-current="page" href="login.html">Login</a></li>
              <li class="nav-item px-3 px-xl-4"><a class="btn btn-outline-dark order-1 order-lg-0 fw-medium" href="register.html">Sign Up</a></li>
            </ul>
          </div>
        </div>
      </nav>

      <section class="pt-8">
        <div class="container">
          <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
              <div class="card shadow rounded-3">
                <div class="card-body p-5">
                  <div class="text-center mb-4">
                    <h3 class="fw-bold font-cursive text-capitalize">Welcome Back</h3>
                    <p class="text-secondary">Login to manage your trips</p>
                  </div>
                  <form id="loginForm">
                    <div class="mb-3">
                      <label for="email" class="form-label">Email address</label>
                      <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                    </div>
                    <div class="mb-3">
                      <label for="password" class="form-label">Password</label>
                      <input type="password" class="form-control" id="password" required>
                    </div>
                    <div class="d-flex justify-content-between mb-4">
                      <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="rememberMe">
                        <label class="form-check-label fs--1" for="rememberMe">Remember me</label>
                      </div>
                      <a href="#!" class="fs--1 text-decoration-none">Forgot Password?</a>
                    </div>
                    <div id="loginError" class="alert alert-danger d-none py-2 fs--1" role="alert"></div>
                    <button type="submit" class="btn btn-primary w-100 mb-3 primary-btn-shadow" id="loginBtn">Login</button>
                    <div class="text-center">
                      <p class="fs--1 mb-0">Don't have an account? <a href="register.html" class="text-decoration-none">Sign up</a></p>
                    </div>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="vendors/@popperjs/popper.min.js"></script>
    <script src="vendors/bootstrap/bootstrap.min.js"></script>
    <script src="vendors/is/is.min.js"></script>
    <script src="assets/js/theme.js"></script>
    <script>
      const API_BASE = '/api';

      document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const errorEl = document.getElementById('loginError');
        const btn = document.getElementById('loginBtn');

        errorEl.classList.add('d-none');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Logging in...';

        try {
          const res = await fetch(`${API_BASE}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });
          const data = await res.json();

          if (!res.ok) {
            throw new Error(data.message || 'Invalid email or password');
          }

          // Store auth data
          localStorage.setItem('traveloop_token', data.token);
          localStorage.setItem('traveloop_user', JSON.stringify(data.data));
          window.location.href = 'dashboard.html';
        } catch (err) {
          console.warn('Backend error, falling back to localStorage auth:', err);
          
          const users = JSON.parse(localStorage.getItem('traveloop_users') || '[]');
          const user = users.find(u => u.email.toLowerCase() === email.toLowerCase() && u.password === password);
          
          if (user) {
            localStorage.setItem('traveloop_token', 'mock_local_token_' + Date.now());
            localStorage.setItem('traveloop_user', JSON.stringify({ id: user.id, name: user.name, email: user.email }));
            window.location.href = 'dashboard.html';
          } else {
            errorEl.innerHTML = 'Invalid email or password.<br><small>If you just started, please <a href="register.html">Register an account</a> first (Offline Mode).</small>';
            errorEl.classList.remove('d-none');
            btn.disabled = false;
            btn.innerHTML = 'Login';
          }
        }
      });
    </script>
  </body>
</html>
